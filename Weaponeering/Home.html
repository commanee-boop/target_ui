<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#02070c">
    <title>Login | Weaponeering System</title>
    <link rel="icon" type="image/png" href="./weaponeering-logo.png">
    <link rel="apple-touch-icon" href="./weaponeering-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            color-scheme: dark;
            --page-bg: #02070c;
            --panel: #03111c;
            --border: #0d6284;
            --field-border: #17354a;
            --text: #f5f9ff;
            --muted: #8fa1b2;
            --gold: #dda62f;
            --cyan: #20c8f4;
            --blue: #2459da;
            --danger: #ff8f87;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 0;
            overflow: hidden;
        }

        body {
            margin: 0;
            color: var(--text);
            background: var(--page-bg);
            font-family: "Kanit", Tahoma, "Leelawadee UI", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button,
        input {
            font: inherit;
        }

        .page {
            display: grid;
            grid-template-rows: minmax(0, 1fr) clamp(36px, 5vh, 48px);
            width: 100%;
            height: 100vh;
            height: 100dvh;
            min-height: 0;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(0, 6, 11, .28) 0%, rgba(0, 6, 11, .4) 48%, rgba(0, 6, 11, .76) 100%),
                url("./background.png") center / cover no-repeat;
        }

        .page-content {
            min-height: 0;
        }

        .visual-side {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            background: transparent;
        }

        .visual-side::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 5, 10, .28), transparent 48%, rgba(0, 4, 8, .26));
            pointer-events: none;
        }

        .visual-brand {
            position: absolute;
            z-index: 2;
            top: 8%;
            left: 50%;
            display: grid;
            justify-items: center;
            width: 90%;
            color: #fff;
            text-align: center;
            transform: translateX(-50%);
            filter: drop-shadow(0 5px 14px rgba(0, 0, 0, .95));
        }

        .visual-brand img {
            position: static;
            width: clamp(144px, 12vw, 186px);
            height: auto;
            object-fit: contain;
        }

        .visual-brand h2 {
            margin: 16px 0 0;
            font-family: Arial, sans-serif;
            font-size: clamp(29px, 2.65vw, 42px);
            line-height: 1.1;
            letter-spacing: .025em;
        }

        .visual-brand p {
            margin: 8px 0 0;
            font-size: clamp(17px, 1.55vw, 23px);
        }

        .login-side {
            display: grid;
            place-items: center;
            min-width: 0;
            min-height: 0;
            padding: clamp(8px, 2vh, 22px) clamp(14px, 2.2vw, 32px);
            background:
                radial-gradient(circle at 50% 42%, rgba(12, 119, 168, .15), transparent 54%);
        }

        .login-card {
            position: relative;
            width: min(620px, 100%);
            max-height: 100%;
            padding: clamp(22px, 3vh, 34px) clamp(26px, 3.3vw, 44px);
            border: 1px solid rgba(23, 134, 178, .72);
            border-radius: 24px;
            background:
                radial-gradient(circle at 50% 0, rgba(18, 102, 143, .12), transparent 35%),
                linear-gradient(150deg, rgba(3, 19, 31, .97), rgba(1, 13, 23, .98));
            box-shadow:
                inset 0 1px rgba(255, 255, 255, .04),
                inset 0 0 46px rgba(18, 122, 162, .045),
                0 24px 70px rgba(0, 0, 0, .52),
                0 0 34px rgba(15, 151, 202, .1);
            backdrop-filter: blur(12px);
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 8%;
            width: 84%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(221, 166, 47, .78), transparent);
            box-shadow: 0 0 12px rgba(221, 166, 47, .3);
            pointer-events: none;
        }

        .card-header h2 {
            margin: 0;
            font-size: clamp(31px, 3.8vh, 40px);
            line-height: 1.2;
            font-weight: 700;
            text-align: center;
            letter-spacing: -.025em;
        }

        .card-header::after {
            content: "";
            display: block;
            width: 100%;
            height: 1px;
            margin-top: clamp(16px, 2.3vh, 22px);
            background: linear-gradient(90deg, transparent, rgba(221, 166, 47, .96), transparent);
            box-shadow: 0 0 9px rgba(221, 166, 47, .42);
        }

        .mobile-login-logo {
            display: none;
            width: 88px;
            height: 88px;
            margin: 0 auto 16px;
            object-fit: contain;
            filter: drop-shadow(0 7px 16px rgba(0, 0, 0, .55));
        }

        .card-header p {
            margin: 14px 0 0;
            color: #a7adb4;
            font-size: 18px;
            line-height: 1.5;
        }

        .login-form {
            display: grid;
            gap: 0;
            margin-top: clamp(14px, 2.5vh, 24px);
        }

        .field-label {
            display: grid;
            gap: 7px;
            color: #f3f3f2;
            font-size: 18px;
            line-height: 1.3;
            font-weight: 700;
        }

        .field-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-title-icon {
            flex: 0 0 auto;
            width: 21px;
            height: 21px;
            color: var(--cyan);
            fill: none;
            stroke: currentColor;
            stroke-width: 1.65;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .field-label+.field-label {
            margin-top: clamp(12px, 2vh, 18px);
        }

        .input-wrap {
            position: relative;
            display: block;
        }

        .input-icon {
            position: absolute;
            z-index: 1;
            left: 20px;
            top: 50%;
            width: 24px;
            height: 24px;
            color: #7890a4;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.65;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            height: clamp(54px, 7vh, 62px);
            padding: 0 62px 0 68px;
            border: 1px solid rgba(32, 91, 122, .62);
            border-radius: 12px;
            outline: none;
            color: #f4f5f5;
            background: rgba(1, 12, 21, .86);
            box-shadow: inset 0 1px 7px rgba(0, 0, 0, .44), 0 1px 0 rgba(255, 255, 255, .02);
            font-size: 19px;
            transition: border-color .16s ease, box-shadow .16s ease;
        }

        input::placeholder {
            color: #858d97;
            opacity: 1;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: inset 0 1px 5px rgba(0, 0, 0, .3), 0 0 0 3px rgba(32, 200, 244, .11), 0 0 18px rgba(32, 200, 244, .11);
        }

        #email {
            padding-left: 22px;
            padding-right: 22px;
        }

        .toggle-password {
            position: absolute;
            z-index: 2;
            top: 50%;
            right: 10px;
            display: grid;
            place-items: center;
            width: 50px;
            height: 50px;
            padding: 0;
            border: 0;
            color: #bcc2c8;
            background: transparent;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .toggle-password svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .separator {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 31px;
            align-items: center;
            margin: clamp(14px, 2.2vh, 20px) 0;
            color: #a8b5c0;
            font-size: 16px;
        }

        .separator::before,
        .separator::after {
            content: "";
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(70, 131, 160, .55));
            box-shadow: 0 1px 6px rgba(41, 171, 209, .2);
        }

        .separator::after {
            background: linear-gradient(90deg, rgba(70, 131, 160, .55), transparent);
        }

        .qr-login {
            display: grid;
            grid-template-columns: minmax(0, 1fr) clamp(108px, 16vh, 132px);
            gap: clamp(14px, 2vw, 22px);
            align-items: center;
        }

        .qr-copy {
            align-self: start;
            padding-top: 2px;
        }

        .qr-copy h3 {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 0 0 5px;
            font-size: 19px;
            line-height: 1.35;
        }

        .qr-title-icon {
            flex: 0 0 auto;
            width: 21px;
            height: 21px;
            color: var(--cyan);
            fill: none;
            stroke: currentColor;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 5px rgba(44, 199, 232, .42));
        }

        .qr-copy p {
            margin: 0;
            color: #91a2b2;
            font-size: 14px;
            line-height: 1.45;
        }

        .qr-frame {
            position: relative;
            display: grid;
            place-items: center;
            width: clamp(108px, 16vh, 132px);
            aspect-ratio: 1;
            padding: 13px;
            background:
                linear-gradient(var(--cyan), var(--cyan)) left top / 30px 3px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) left top / 3px 30px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) right top / 30px 3px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) right top / 3px 30px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) left bottom / 30px 3px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) left bottom / 3px 30px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) right bottom / 30px 3px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) right bottom / 3px 30px no-repeat;
            filter: drop-shadow(0 0 9px rgba(32, 200, 244, .35));
        }

        .qr-frame::after {
            content: "";
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(44, 199, 232, .13);
            pointer-events: none;
        }

        .qr-code {
            position: relative;
            z-index: 1;
            display: grid;
            place-items: center;
            width: 100%;
            aspect-ratio: 1;
            padding: 6px;
            background: #fff;
            box-shadow: 0 5px 16px rgba(0, 0, 0, .55), 0 0 12px rgba(44, 199, 232, .14);
        }

        .qr-code canvas,
        .qr-code img {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .qr-code.is-loading::after {
            content: "กำลังโหลด...";
            color: #34404b;
            font-size: 12px;
        }

        .qr-status {
            min-height: 32px;
            margin: 5px 0 7px;
            color: #a2a9b1;
            font-size: 13px;
            line-height: 1.55;
        }

        .qr-refresh {
            padding: 5px 10px;
            border: 1px solid rgba(32, 200, 244, .5);
            border-radius: 7px;
            color: #72ddf8;
            background: rgba(32, 200, 244, .035);
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(32, 200, 244, .04), 0 3px 10px rgba(0, 0, 0, .16);
        }

        .qr-refresh:disabled {
            cursor: wait;
            opacity: .55;
        }

        .message {
            min-height: 20px;
            margin: 7px 0 3px;
            color: #aeb6be;
            font-size: 13px;
            line-height: 20px;
        }

        .message.error {
            color: var(--danger);
            font-weight: 700;
        }

        .login-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: clamp(54px, 7vh, 62px);
            margin-left: 0;
            border: 0;
            border: 1px solid rgba(89, 198, 255, .62);
            border-radius: 10px;
            color: #fff;
            background: linear-gradient(100deg, #17b7e6 0%, #1889e9 52%, #2754d7 100%);
            font-size: 21px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(18, 115, 223, .24), inset 0 1px rgba(255, 255, 255, .18);
            transition: filter .16s ease, transform .16s ease;
        }

        .login-button svg {
            width: 28px;
            height: 28px;
            margin-right: 10px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: -6px;
        }

        .login-button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: none;
        }

        .login-button:disabled {
            cursor: wait;
            filter: grayscale(.25);
            opacity: .72;
            transform: none;
        }

        .superapp-help {
            margin-top: 36px;
            padding: 18px 20px;
            border: 1px solid rgba(221, 166, 47, .24);
            border-radius: 10px;
            color: #c5c9ce;
            background: rgba(221, 166, 47, .055);
            font-size: 14px;
            line-height: 1.7;
        }

        .superapp-help strong {
            display: block;
            margin-bottom: 3px;
            color: #f4f4f3;
            font-size: 16px;
        }

        .page-footer {
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 0 36px;
            border-top: 1px solid rgba(105, 151, 177, .25);
            color: #9299a1;
            background: rgba(1, 5, 10, .82);
            box-shadow: 0 -1px 0 rgba(255, 196, 45, .11), 0 -8px 26px rgba(0, 0, 0, .32);

            font-size: 13px;
        }

        .developer-credit {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .developer-credit-logo {
            width: 28px;
            height: 28px;
            flex: 0 0 28px;
            object-fit: contain;
        }

        @media (max-width: 991.98px) {
            .page {
                grid-template-rows: minmax(0, 1fr) 40px;
            }

            .visual-side {
                display: none !important;
            }

            .login-side {
                width: 100%;
                flex: 0 0 100%;
                height: 100%;
                min-height: 0;
                padding: 10px 12px;
            }

            .login-card {
                padding: 16px 20px;
            }
        }

        /* โทรศัพท์ทุกแนว และแท็บเล็ตแนวตั้ง ใช้หน้าตาแบบ Mobile */
        @media (max-width: 991.98px),
        (min-width: 992px) and (max-width: 1199.98px) and (orientation: portrait) {
            .page {
                display: flex;
                flex-direction: column;
                height: 100vh;
                height: 100dvh;
                min-height: 0;
                overflow: hidden;
            }

            .visual-side {
                display: none !important;
            }

            .page-content {
                flex: 1 1 auto;
                width: 100%;
                min-height: 0;
                overflow-y: auto;
            }

            .login-side {
                width: 100%;
                height: auto;
                flex: 1 1 auto;
                place-items: center;
                min-height: 100%;
                padding: 14px 16px;
            }

            .login-card {
                padding: clamp(18px, 2.5vh, 24px) 24px;
                border-radius: 18px;
            }

            .card-header {
                text-align: center;
            }

            .mobile-login-logo {
                display: block;
                width: clamp(58px, 9vh, 76px);
                height: clamp(58px, 9vh, 76px);
                margin-bottom: 8px;
            }

            .card-header h2 {
                font-size: clamp(28px, 4vh, 34px);
            }

            .card-header p {
                margin-top: 8px;
                font-size: 17px;
            }

            .login-form {
                margin-top: clamp(10px, 2vh, 16px);
            }

            .field-label+.field-label {
                margin-top: clamp(9px, 1.5vh, 14px);
            }

            input[type="email"],
            input[type="password"],
            input[type="text"] {
                height: clamp(52px, 7vh, 58px);
                font-size: 18px;
            }

            .separator {
                gap: 14px;
                margin: clamp(10px, 1.8vh, 16px) 0;
            }

            .qr-login {
                grid-template-columns: minmax(0, 1fr) clamp(108px, 16vh, 128px);
                gap: 16px;
            }

            .qr-frame {
                width: clamp(108px, 16vh, 128px);
            }

            .login-button {
                width: 100%;
                min-height: clamp(52px, 7vh, 58px);
                margin-left: 0;
            }

            .page-footer {
                flex: 0 0 40px;
                min-height: 40px;
                justify-content: center;
                padding: 0 16px;
            }

            .page-footer span:first-child {
                display: none !important;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding-right: 16px;
                padding-left: 16px;
            }

            .qr-copy p {
                font-size: 12px;
            }
        }

        /* จอแนวนอน: แสดงโลโก้กึ่งกลางเหนือคำว่าเข้าสู่ระบบ */
        @media (orientation: landscape) and (min-width: 992px) {
            .visual-side {
                width: calc(44% - 1cm);
                flex: 0 0 calc(44% - 1cm);
            }

            .login-side {
                width: calc(56% + 1cm);
                flex: 0 0 calc(56% + 1cm);
            }

            .login-card {
                width: min(calc(720px + 1cm), 100%);
                padding: 24px 40px;
                border-radius: 22px;
            }

            .visual-brand img,
            .mobile-login-logo {
                width: 88px;
                height: 88px;
            }

            .visual-brand img {
                width: clamp(144px, 12vw, 186px);
                height: auto;
            }

            .mobile-login-logo {
                position: static;
                display: block;
                width: 100px;
                height: 100px;
                margin: 0 auto 8px;
            }

            .visual-brand h2 {
                margin-top: 24px;
                font-size: clamp(29px, 2.65vw, 42px);
            }

            .visual-brand p {
                margin-top: 4px;
                font-size: clamp(17px, 1.55vw, 23px);
            }

            .card-header h2 {
                font-size: 36px;
            }

            .card-header::after {
                margin-top: 14px;
            }

            .login-form {
                margin-top: 20px;
            }

            .field-label {
                gap: 7px;
                font-size: 18px;
            }

            .field-label+.field-label {
                margin-top: 16px;
            }

            .field-title-icon,
            .input-icon {
                width: 23px;
                height: 23px;
            }

            input[type="email"],
            input[type="password"],
            input[type="text"] {
                height: 54px;
                font-size: 18px;
            }

            .separator {
                margin: 16px 0;
                font-size: 16px;
            }

            .qr-login {
                grid-template-columns: minmax(0, 1fr) 116px;
                gap: 18px;
            }

            .qr-frame {
                width: 116px;
                padding: 11px;
            }

            .qr-copy h3 {
                font-size: 19px;
            }

            .qr-copy p {
                font-size: 15px;
            }

            .qr-status {
                min-height: 30px;
                margin: 5px 0 7px;
                font-size: 14px;
            }

            .qr-refresh {
                padding: 6px 12px;
                font-size: 15px;
            }

            .message {
                min-height: 22px;
                margin: 6px 0 3px;
                font-size: 14px;
                line-height: 22px;
            }

            .login-button {
                min-height: 54px;
                font-size: 20px;
            }
        }

        @media (max-height: 620px) and (max-width: 539.98px) {
            .mobile-login-logo {
                display: none;
            }

            .login-card {
                padding: 14px 18px;
            }

            .card-header h2 {
                font-size: 26px;
            }

            .login-form {
                margin-top: 6px;
            }

            .field-label {
                gap: 5px;
                font-size: 15px;
            }

            .field-label+.field-label {
                margin-top: 7px;
            }

            input[type="email"],
            input[type="password"],
            input[type="text"] {
                height: 46px;
                font-size: 16px;
            }

            .separator {
                margin: 6px 0;
                font-size: 12px;
            }

            .qr-login {
                grid-template-columns: minmax(0, 1fr) 96px;
            }

            .qr-frame {
                width: 96px;
                padding: 8px;
            }

            .qr-copy p {
                display: none;
            }

            .qr-copy h3 {
                font-size: 16px;
            }

            .qr-status {
                min-height: 18px;
                margin: 2px 0 3px;
                font-size: 11px;
            }

            .qr-refresh {
                padding: 5px 10px;
                font-size: 13px;
            }

            .message {
                min-height: 15px;
                margin: 3px 0 2px;
                line-height: 15px;
            }

            .login-button {
                min-height: 46px;
                font-size: 17px;
            }

            .page-footer {
                flex-basis: 32px;
                min-height: 32px;
            }
        }

        /* หน้าจอแนวนอนหรือจอเตี้ย: วางช่องกรอกคู่กันเพื่อให้ครบในหนึ่ง viewport */
        @media (max-height: 560px) and (min-width: 540px) {
            .page {
                grid-template-rows: minmax(0, 1fr);
            }

            .page-footer {
                display: none !important;
            }

            .mobile-login-logo {
                position: static;
                display: block !important;
                width: 42px;
                height: 42px;
                margin: 0 auto 4px;
            }

            .login-side {

                    </header>
                    <div class="header-rule"></div>

                    <form class="login-form" id="loginForm" novalidate>
                        <div class="field-group">
                            <label class="field-label" for="email">
                                <svg class="field-title-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="m4 7 8 6 8-6"></path>

                            </label>
                            <span class="input-wrap">
                                <!-- <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true"> -->
                                <path d="M20 15a8 8 0 1 0-2 3l-2-2"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                                </svg>

                                            d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3">

                                <div class="qr-status" id="qrStatus" aria-live="polite">กำลังสร้าง QR Code...</div>

                <span>พัฒนาโดยศูนย์ซอฟต์แวร์กองทัพอากาศ</span>

    <script src="./qrcode.min.js"></script>
    <script src="./config.js"></script>
    <script>
        const loginForm = document.querySelector("#loginForm");
        const email = document.querySelector("#email");
        const password = document.querySelector("#password");
        const message = document.querySelector("#message");
        const loginButton = document.querySelector("#loginButton");
        const qrCode = document.querySelector("#qrCode");
        const qrStatus = document.querySelector("#qrStatus");
        const qrRefresh = document.querySelector("#qrRefresh");
        const authConfig = window.WEAPONEERING_CONFIG || {};
        let qrPollTimer = null;
        let qrAbortController = null;

        function showMessage(text, isError = false) {
            message.textContent = text;
            message.className = `message${isError ? " error" : ""}`;
        }

        function normalizeUser(value) {
            return value.trim().toLowerCase().replace(/@rtaf\.mi\.th$/i, "");
        }

        async function readResponse(response) {
            if (response.status === 204) return null;
            const text = await response.text();
            if (!text) return null;
            try {
                return JSON.parse(text);
            } catch {
                return text;
            }
        }

        function responseMessage(data, fallback) {
            if (!data) return fallback;
            if (typeof data === "string") return data.slice(0, 240) || fallback;
            return data.message || data.detail || data.error || fallback;
        }

        function configured(value) {
            return Boolean(value && !value.includes("REPLACE_"));
        }

        function qrField(data, ...names) {
            for (const name of names) {
                if (data && data[name] !== undefined) return data[name];
            }
            return undefined;
        }

        function stopQrPolling() {
            window.clearTimeout(qrPollTimer);
            qrAbortController?.abort();
            qrAbortController = null;
        }

        function completeLogin(user = "super-app-user") {
            sessionStorage.setItem("weaponeering-authenticated", "true");
            sessionStorage.setItem("weaponeering-user", user);
            window.location.replace(authConfig.successUrl || "index.html");
        }

        async function pollQrStatus(statusUrl) {
            qrAbortController = new AbortController();
            try {
                const response = await fetch(statusUrl, {
                    headers: { "Accept": "application/json" },
                    credentials: authConfig.credentials || "include",
                    cache: "no-store",
                    signal: qrAbortController.signal
                });
                const data = await readResponse(response);
                if (!response.ok) throw new Error(responseMessage(data, "ตรวจสอบสถานะ QR ไม่สำเร็จ"));

                const state = String(qrField(data, "status", "state") || "pending").toLowerCase();
                if (["approved", "authenticated", "success", "completed"].includes(state)) {
                    qrStatus.textContent = "ยืนยันตัวตนสำเร็จ กำลังเปิดระบบ...";
                    completeLogin(qrField(data, "user", "username") || "super-app-user");
                    return;
                }
                if (["expired", "denied", "rejected", "cancelled", "error"].includes(state)) {
                    qrStatus.textContent = state === "expired"
                        ? "QR Code หมดอายุ กรุณาสร้างใหม่"
                        : responseMessage(data, "การยืนยันผ่าน QR ไม่สำเร็จ");
                    qrRefresh.disabled = false;
                    return;
                }

                qrStatus.textContent = "รอการสแกนและยืนยันใน RTAF Super App...";
                qrPollTimer = window.setTimeout(() => pollQrStatus(statusUrl), authConfig.qrPollInterval || 2000);
            } catch (error) {
                if (error.name === "AbortError") return;
                qrStatus.textContent = error instanceof TypeError
                    ? "เชื่อมต่อบริการ QR Login ไม่ได้"
                    : error.message;
                qrRefresh.disabled = false;
            }
        }

        async function startQrLogin() {
            stopQrPolling();
            qrCode.replaceChildren();
            qrCode.classList.add("is-loading");
            qrRefresh.disabled = true;

            if (!configured(authConfig.qrStartEndpoint)) {
                qrCode.classList.remove("is-loading");
                // qrStatus.textContent = "ยังไม่ได้กำหนด QR Login endpoint ใน config.js";
                qrRefresh.disabled = false;
                return;
            }

            qrStatus.textContent = "กำลังสร้าง QR Code...";
            try {
                const response = await fetch(authConfig.qrStartEndpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    credentials: authConfig.credentials || "include",
                    cache: "no-store",
                    body: JSON.stringify({ returnUrl: new URL(authConfig.successUrl || "index.html", location.href).href })
                });
                const data = await readResponse(response);
                if (!response.ok) throw new Error(responseMessage(data, "สร้าง QR Code ไม่สำเร็จ"));

                const sessionId = qrField(data, "sessionId", "session_id", "requestId", "request_id", "id");
                const qrData = qrField(data, "qrData", "qr_data", "deepLink", "deep_link", "url");
                let statusUrl = qrField(data, "statusUrl", "status_url");
                if (!statusUrl && configured(authConfig.qrStatusEndpoint) && sessionId) {
                    statusUrl = authConfig.qrStatusEndpoint.replace("{sessionId}", encodeURIComponent(sessionId));
                }
                if (!qrData || !statusUrl) throw new Error("QR API ส่งข้อมูล session ไม่ครบ");

                qrCode.classList.remove("is-loading");
                new QRCode(qrCode, {
                    text: qrData,
                    width: 129,
                    height: 129,
                    colorDark: "#050505",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
                qrStatus.textContent = "รอการสแกนและยืนยันใน RTAF Super App...";
                pollQrStatus(new URL(statusUrl, location.href).href);
            } catch (error) {
                qrCode.classList.remove("is-loading");
                qrStatus.textContent = error instanceof TypeError
                    ? "เชื่อมต่อบริการ QR Login ไม่ได้"
                    : error.message;
                qrRefresh.disabled = false;
            }
        }

        password.addEventListener("input", () => {
            password.value = password.value.replace(/\D/g, "").slice(0, 6);
        });

        email.addEventListener("blur", () => {
            email.value = normalizeUser(email.value);
        });

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const user = normalizeUser(email.value);
            const otp = password.value.trim();

            if (!/^[a-z0-9._-]+$/i.test(user)) {
                showMessage("กรุณากรอกชื่ออีเมล ทอ. โดยไม่ต้องใส่ @rtaf.mi.th", true);
                email.focus();
                return;
            }

            if (!/^\d{6}$/.test(otp)) {
                showMessage("กรุณากรอก OTP จาก RTAF Super App ให้ครบ 6 หลัก", true);
                password.focus();
                return;
            }

            if (!authConfig.otpEndpoint || authConfig.otpEndpoint.includes("REPLACE_")) {
                showMessage("ยังไม่ได้กำหนด OTP endpoint ในไฟล์ config.js", true);
                return;
            }

            if (location.protocol === "file:") {
                showMessage("กรุณาเปิดระบบผ่าน http://127.0.0.1:3000 หลังสั่ง npm start", true);
                return;
            }

            loginButton.disabled = true;
            showMessage("กำลังตรวจสอบ OTP กับ RTAF Super App...");

            try {
                const response = await fetch(authConfig.otpEndpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: authConfig.otpCredentials || "omit",
                    cache: "no-store",
                    body: JSON.stringify({ user, pass: otp })
                });
                const data = await readResponse(response);

                if (!response.ok) {
                    throw new Error(responseMessage(data, "อีเมลหรือ OTP ไม่ถูกต้อง"));
                }

                const explicitlyRejected = data && typeof data === "object" && (
                    data.success === false || data.ok === false || data.status === "error"
                );
                if (explicitlyRejected) {
                    throw new Error(responseMessage(data, "อีเมลหรือ OTP ไม่ถูกต้อง"));
                }

                password.value = "";
                showMessage("ยืนยันตัวตนสำเร็จ กำลังเปิดระบบ...");
                completeLogin(user);
            } catch (error) {
                const networkError = error instanceof TypeError;
                showMessage(
                    networkError
                        ? "เชื่อมต่อเซิร์ฟเวอร์ Login ไม่ได้ กรุณาตรวจสอบว่า npm start ยังทำงานอยู่"
                        : error.message,
                    true
                );
                password.value = "";
                password.focus();
                loginButton.disabled = false;
            }
        });

        qrRefresh.addEventListener("click", startQrLogin);
        window.addEventListener("pagehide", stopQrPolling);
        startQrLogin();
    </script>
</body>

</html>
